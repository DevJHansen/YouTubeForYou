<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-shell">
    <header class="popup-header">
      <div class="brand">
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <circle cx="64" cy="64" r="58" fill="none" stroke="#FF0000" stroke-width="6"/>
          <circle cx="64" cy="64" r="46" fill="#FF0000"/>
          <path d="M52 42 L52 86 L88 64 Z" fill="white"/>
        </svg>
        <span>ForYou</span>
      </div>
      <div class="header-account" id="headerAccount"></div>
    </header>

    <div class="popup-stat">
      <div class="num" id="statWatchTime">0<span class="unit">m</span></div>
      <div class="lbl">Watched this week</div>
    </div>

    <div class="upsell-slot" id="upsellSlot"></div>

    <div class="lock-notice" id="lockNotice" hidden>
      Solve the puzzle on the YouTube tab to change these settings.
    </div>

    <div class="popup-list" id="list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
