<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@500&display=swap">
  <style>
    :root {
      --bg: #0b0b0c;
      --bg-1: #121214;
      --bg-2: #17171a;
      --bg-3: #1e1e22;
      --line: #252528;
      --line-soft: #1c1c1f;
      --text: #ededf0;
      --text-dim: #a1a1a8;
      --text-faint: #6c6c74;
      --accent: #ff0000;
      --accent-soft: rgba(255, 0, 0, 0.12);
      --accent-line: rgba(255, 0, 0, 0.4);
      --accent-ink: #ffffff;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Geist', ui-sans-serif, system-ui, sans-serif;
      font-feature-settings: "ss01", "cv11";
      -webkit-font-smoothing: antialiased;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      width: 340px;
      line-height: 1.5;
    }

    /* ---- Header ---- */
    .header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line-soft);
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand-row { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 22px; height: 22px;
      display: grid; place-items: center;
      flex-shrink: 0;
    }
    .brand-mark svg { display: block; width: 100%; height: 100%; }
    .brand-title {
      font-size: 14px; font-weight: 600; letter-spacing: -0.01em;
    }
    .status {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 10px;
      color: var(--accent);
      display: inline-flex; align-items: center; gap: 6px;
    }
    .status::before {
      content: ''; width: 5px; height: 5px; border-radius: 50%; background: var(--accent);
    }

    /* ---- Stats ---- */
    .stats {
      display: grid; grid-template-columns: 1fr 1fr; gap: 1px;
      background: var(--line-soft);
      border-bottom: 1px solid var(--line-soft);
    }
    .stats > div { background: var(--bg); padding: 12px 18px; }
    .stats .num { font-size: 20px; font-weight: 500; letter-spacing: -0.02em; }
    .stats .num .unit { font-size: 12px; color: var(--text-faint); margin-left: 2px; }
    .stats .lbl {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 9px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-top: 2px;
    }

    /* ---- Lock notice ---- */
    .lock-notice {
      margin: 12px 18px 0;
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
      color: var(--accent);
      font-size: 11px;
      padding: 10px 12px;
      border-radius: 8px;
      line-height: 1.4;
      font-family: 'Geist Mono', ui-monospace, monospace;
    }

    /* ---- Groups + rows ---- */
    .group-label {
      padding: 14px 18px 6px;
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 10px;
      color: var(--text-faint);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .group-label::after { content: ''; flex: 1; height: 1px; background: var(--line-soft); }

    .row {
      display: flex; align-items: center; gap: 12px;
      padding: 9px 18px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .row:hover:not(.disabled) { background: var(--bg-1); }
    .row .icon {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--bg-3);
      display: grid; place-items: center;
      color: var(--text-dim);
      flex-shrink: 0;
    }
    .row.active .icon { background: var(--accent-soft); color: var(--accent); }
    .row .label {
      flex: 1; min-width: 0;
      display: inline-flex; align-items: center; gap: 8px;
    }
    .row .pro-badge {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.1em;
      padding: 2px 5px; border-radius: 3px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .row.sub {
      padding-left: 44px;
      position: relative;
    }
    .row.sub::before {
      content: '';
      position: absolute;
      left: 30px; top: 0; bottom: 0;
      width: 1px;
      background: var(--line);
    }
    .row.disabled .label,
    .row.disabled .icon { opacity: 0.4; }
    .row.locked { cursor: pointer; }
    .row.locked .lock-sym {
      color: var(--text-faint);
      display: grid; place-items: center;
      width: 18px; height: 18px;
    }
    .row.locked:hover .lock-sym { color: var(--accent); }

    /* ---- Toggle ---- */
    .switch {
      position: relative;
      display: inline-block;
      width: 32px; height: 18px;
      flex-shrink: 0;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: var(--bg-3);
      border-radius: 999px;
      transition: background 0.2s;
    }
    .slider::after {
      position: absolute;
      content: "";
      width: 14px; height: 14px;
      left: 2px; top: 2px;
      background: var(--text-faint);
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider::after { transform: translateX(14px); background: #fff; }
    input:disabled + .slider { cursor: not-allowed; opacity: 0.4; }

    /* ---- Account footer ---- */
    .account {
      padding: 14px 18px 16px;
      border-top: 1px solid var(--line-soft);
      display: flex; flex-direction: column; gap: 10px;
    }
    .account-user {
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px;
      color: var(--text-dim);
    }
    .account-user .email { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .plan-pill {
      font-family: 'Geist Mono', ui-monospace, monospace;
      font-size: 9px;
      padding: 2px 6px; border-radius: 3px;
      letter-spacing: 0.1em;
    }
    .plan-pill.pro { background: var(--accent-soft); color: var(--accent); }
    .plan-pill.free { background: var(--bg-3); color: var(--text-dim); }

    .btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px; font-weight: 500;
      cursor: pointer;
      border: 0;
      font-family: inherit;
      text-decoration: none;
      transition: filter 0.15s, transform 0.15s, background 0.15s, border-color 0.15s;
    }
    .btn-primary {
      background: var(--accent); color: var(--accent-ink);
    }
    .btn-primary:hover { filter: brightness(1.08); transform: translateY(-1px); }
    .btn-ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--text);
    }
    .btn-ghost:hover { border-color: var(--text-faint); background: var(--bg-1); }
    .btn-link {
      background: transparent;
      color: var(--text-dim);
      font-size: 12px;
      padding: 4px 0;
      text-align: center;
    }
    .btn-link:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="header">
    <div class="brand-row">
      <span class="brand-mark">
        <svg viewBox="0 0 128 128" aria-hidden="true">
          <circle cx="64" cy="64" r="58" fill="none" stroke="#FF0000" stroke-width="6"/>
          <circle cx="64" cy="64" r="46" fill="#FF0000"/>
          <path d="M52 42 L52 86 L88 64 Z" fill="white"/>
        </svg>
      </span>
      <span class="brand-title">ForYou</span>
    </div>
    <span class="status">Active · <span id="activeCount">0</span> rules</span>
  </div>

  <div class="stats">
    <div>
      <div class="num" id="statShorts">0</div>
      <div class="lbl">Shorts blocked</div>
    </div>
    <div>
      <div class="num" id="statSaved">0<span class="unit">h</span></div>
      <div class="lbl">Saved this week</div>
    </div>
  </div>

  <div class="lock-notice" id="lockNotice" hidden>
    Solve the puzzle on the YouTube tab to change these settings.
  </div>

  <div class="group-label">Free</div>
  <div class="list" id="freeList"></div>

  <div class="group-label">Pro</div>
  <div class="list" id="proList"></div>

  <div class="account" id="accountArea"></div>

  <script src="popup.js"></script>
</body>
</html>
